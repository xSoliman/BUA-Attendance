<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration — BUA Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>
                Configuration
                <span class="brand-sub">BUA Attendance System</span>
            </h1>
        </header>
        <main>
            <div class="config-form">
                <div class="form-group">
                    <label for="spreadsheet-id">Google Sheet URL or ID</label>
                    <input type="text" id="spreadsheet-id" placeholder="Paste your Google Sheet URL here" />
                    <p class="help-text">
                        Paste the full URL (e.g., https://docs.google.com/spreadsheets/d/1abc.../edit)<br>
                        or just the Spreadsheet ID
                    </p>
                </div>

                <div class="service-account-info">
                    <h3>Setup Instructions</h3>
                    <p>Add this email as an <strong>Editor</strong> to your Google Sheet:</p>
                    <code id="service-account-email">Loading...</code>
                </div>

                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                    <button id="save-config" class="btn btn-primary">Save Configuration</button>
                    <button id="clear-config" class="btn btn-secondary">Clear Configuration</button>
                </div>

                <div id="validation-status"></div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>

</html>
