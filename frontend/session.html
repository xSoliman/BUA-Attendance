<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Setup — BUA Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>
                Session Setup
                <span class="brand-sub">BUA Attendance System</span>
            </h1>
            <button id="change-config-btn" class="btn btn-secondary">⚙ Configuration</button>
        </header>
        <main>
            <div class="session-form">
                <div class="form-group">
                    <label for="course-sheet">Select Course</label>
                    <select id="course-sheet">
                        <option value="">Loading courses...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="attendance-column">Select Week / Session</label>
                    <select id="attendance-column" disabled>
                        <option value="">Select a course first</option>
                    </select>
                </div>

                <button id="start-scanner" class="btn btn-primary btn-large" disabled>
                    Start Scanner
                </button>
                <div id="loading-indicator" class="hidden">Loading...</div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
